<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover Madagascar, its geography, weather, and key facts.">
    <meta name="author" content="Diego">

    <title>Madagascar | WDD 131 Place Assignment</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place_media_query.css">

    <script src="scripts/place.js" defer></script>
</head>

<body>

    <header>
        <h1>Madagascar</h1>
    </header>

    <main>

        <section class="hero">

            <picture>
                <source srcset="images/alle-de-baobab.webp" media="(min-width: 768px)">
                <img src="images/alle-de-baobab.webp" alt="Ring-tailed lemurs in Madagascar" width="1200" height="700">
            </picture>

            <section class="card data">
                <h2>Data</h2>

                <!-- <p><strong>Area:</strong>587,041 sq km</p> -->
                <p><strong>Population:</strong> 27,691,018</p>
                <p><strong>Capital:</strong> Antananarivo</p>
                <p><strong>Languages:</strong> Malagasy, French</p>
                <p><strong>Currency:</strong> Malagasy Ariary</p>
                <p><strong>Time Zone:</strong> UTC+3</p>
                <p><strong>Calling Code:</strong> +261</p>
                <p><strong>Internet TLD:</strong> .mg</p>

            </section>

            <section class="card weather">
                <h2>Weather</h2>

                <img src="images/weather.svg" alt="Weather Icon" class="weather-icon">

                <p><strong>Temperature:</strong> <span id="temperature">10</span> °C</p>
                <p><strong>Conditions:</strong> Partly Cloudy</p>
                <p><strong>Wind:</strong> <span id="windSpeed">5</span> km/h</p>
                <p><strong>Wind Chill:</strong> <span id="windChill"></span></p>

            </section>

        </section>

    </main>

    <footer>
        <p>
            &copy;<span id="currentyear"></span> Diego | Madagascar
        </p>

        <p>
            Last Modified:
            <span id="lastModified"></span>
        </p>
    </footer>

</body>

</html>
